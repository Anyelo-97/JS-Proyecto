<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/login_register.css"></link>
    <title>Document</title>
</head>
<body>

    <div class="container">
        <div class="container-extra">
            <img src="../media/HOME hero illustration 750 padded-04.png">
        </div>
        <form class="container-card">
            <img src="../media/logo.png">
            <h1>Registro</h1>
            <h2>Por favor digite sus datos para registrarse </h2>
            <input id="email" placeholder="Correo" type="email" required>
            <input id="password" placeholder="Contraseña" type="password" required>
            <select class="select" id="rol" required>
                <option value="">Elija su rol</option>
                <option value="Administrativo">Administrativo</option>
                <option value="Profesor">Profesor</option>
                <option value="Estudiante">Estudiante</option>
            </select>
            <button type="submit" id="registrar">Registrarme</button>
            <a href="../pages/login.html">¿Tienes una cuenta?. Inicia sesion aquí</a>
        </form>
    </div>
    
</body>

<script src="../scripts/register_login.js"></script>
</html>
